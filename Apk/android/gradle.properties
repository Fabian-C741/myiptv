org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Parallel desactivado temporalmente para evitar corrupcion de cache de transforms
org.gradle.parallel=false
org.gradle.configureondemand=false
# Daemon desactivado para evitar bloqueo de archivos en la cache
org.gradle.daemon=false
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true
# Desactiva el nuevo DSL de AGP 9+ para compatibilidad con Flutter Gradle Plugin
android.newDsl=false
