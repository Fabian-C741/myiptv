name: ott_app
description: "Una aplicación OTT completa para Android TV, móviles y tablets."
publish_to: 'none'
version: 1.0.9+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0
  url_launcher: ^6.2.5

  # Red y Datos
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1
  youtube_explode_dart: ^2.2.2

  # UI y Multimedia
  media_kit: ^1.1.10
  media_kit_video: ^1.1.10
  media_kit_libs_video: 1.0.7 # Native builds
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.7.0

  # Utils
  intl: ^0.19.0
  device_info_plus: ^10.1.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false

  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#1a1a1e"
  adaptive_icon_foreground: "assets/icons/logo.png"

